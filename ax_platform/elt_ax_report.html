    <div id="toast-container" class="fixed bottom-8 right-8 z-[100] flex flex-col gap-4"></div>

    <script>

        let taskData = [];
        let availableWids = [];
        let selectedWid = '';
        let compareWid = '';
        let currentTop5Mode = 'best';
        let progressChart = null;
        let deptStageChart = null;
        let activeFilters = { dept: [], manager: [], stage: [], stack: [], tool: [] };
        
        let reportTitle = "과제 진척 리포트";
        let currentState = { theme: 'light' };

        function showToast(message, type = 'info') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'fixed bottom-8 right-8 z-[100] flex flex-col gap-4';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            const colors = {
                'success': 'bg-green-500/10 border-green-500/20 text-green-400',
                'error': 'bg-red-500/10 border-red-500/20 text-red-400',
                'info': 'bg-primary/10 border-primary/20 text-primary'
            };
            const icons = {
                'success': 'check-circle',
                'error': 'alert-circle',
                'info': 'info'
            };

            toast.className = `glass ${colors[type]} px-6 py-4 rounded-2xl border flex items-center gap-3 shadow-2xl animate-fade-in`;
            toast.innerHTML = `
                <i data-lucide="${icons[type]}" class="w-5 h-5"></i>
                <span class="text-sm font-bold">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-full', 'transition-all', 'duration-500');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function initApp() {
            setTheme(localStorage.getItem('ax_theme') || 'light');
            
            // Load Data from LocalStorage or Embedded Data
            let allWeeklyData = {};
            const embeddedNode = document.getElementById('embedded-data');
            if (embeddedNode && embeddedNode.textContent.trim() !== '{}' && embeddedNode.textContent.trim() !== '') {
                try {
                    allWeeklyData = JSON.parse(embeddedNode.textContent);
                    console.log('Loaded embedded standalone data.');
                    // Optionally sync to localStorage for the user to edit later
                    localStorage.setItem('ax_weekly_tasks', JSON.stringify(allWeeklyData));
                } catch(e) {
                    console.error('Failed to parse embedded data', e);
                    allWeeklyData = JSON.parse(localStorage.getItem('ax_weekly_tasks') || '{}');
                }
            } else {
                allWeeklyData = JSON.parse(localStorage.getItem('ax_weekly_tasks') || '{}');
            }
            
            availableWids = Object.keys(allWeeklyData).filter(w => w !== 'W19' || (allWeeklyData[w] && allWeeklyData[w].length > 0)).sort((a, b) => b.localeCompare(a));
            
            if (availableWids.length > 0) {
                selectedWid = availableWids[0]; // Latest
                compareWid = availableWids.length > 1 ? availableWids[1] : availableWids[0];
                taskData = allWeeklyData[selectedWid] || [];
                
                // Fetch prev data for comparison if needed
                const prevData = allWeeklyData[compareWid] || [];
                taskData = taskData.map(t => {
                    const pt = prevData.find(p => p.과제명 === t.과제명 && p.부서명 === t.부서명);
                    return {
                        ...t,
                        진척도_이전: pt ? pt.진척도 : (t.진척도_이전 || 0)
                    };
                });
            }
            
            renderTasks();
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', initApp);

function setTheme(theme) {
            // Handle legacy 'white' theme requests if they come from old localStorage
            if (theme === 'white') theme = 'light';
            
            currentState.theme = theme;
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('ax_theme', theme);
            
            // Update UI
            document.querySelectorAll('[id^="theme-"]').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('text-textSecondary');
            });
            const activeBtn = document.getElementById(`theme-${theme}`);
            if (activeBtn) {
                activeBtn.classList.add('bg-primary', 'text-white');
                activeBtn.classList.remove('text-textSecondary');
            }
        }

function switchWid(wid) {
            if (!wid) return;
            selectedWid = wid;
            localStorage.setItem('ax_selected_wid', wid);
            
            const allWeeklyData = JSON.parse(localStorage.getItem('ax_weekly_tasks') || '{}');
            taskData = allWeeklyData[selectedWid] || [];
            const prevData = allWeeklyData[compareWid] || [];
            taskData = taskData.map(t => {
                const pt = prevData.find(p => p.과제명 === t.과제명 && p.부서명 === t.부서명);
                return {
                    ...t,
                    진척도_이전: pt ? pt.진척도 : (t.진척도_이전 || 0)
                };
            });
            renderTasks();

        }

function switchCompareWid(wid) {
            if (!wid) return;
            compareWid = wid;
            localStorage.setItem('ax_compare_wid', wid);
            
            const allWeeklyData = JSON.parse(localStorage.getItem('ax_weekly_tasks') || '{}');
            taskData = allWeeklyData[selectedWid] || [];
            const prevData = allWeeklyData[compareWid] || [];
            taskData = taskData.map(t => {
                const pt = prevData.find(p => p.과제명 === t.과제명 && p.부서명 === t.부서명);
                return {
                    ...t,
                    진척도_이전: pt ? pt.진척도 : (t.진척도_이전 || 0)
                };
            });
            renderTasks();

        }

function exportToExcel() {
            try {
                showToast('Excel 리포트 생성 중...', 'info');
                
                // Get current filters
                const activeFilters = {};
                ['dept', 'manager', 'stage', 'stack', 'tool'].forEach(cat => {
                    const dropdown = document.getElementById(`content-${cat}`);
                    if (dropdown) {
                        const selected = Array.from(dropdown.querySelectorAll('.filter-item.active span'))
                            .map(s => s.innerText);
                        if (!selected.includes('전체')) {
                            activeFilters[cat] = selected;
                        }
                    }
                });

                // Filter raw taskData based on active filters
                const filteredData = taskData.filter(t => {
                    const matchDept = !activeFilters.dept || activeFilters.dept.includes(t.부서명);
                    const matchManager = !activeFilters.manager || activeFilters.manager.includes(t.담당자);
                    const matchStage = !activeFilters.stage || activeFilters.stage.includes(t.단계 || (parseFloat(t.진척도) === 100 ? '완료' : '계획'));
                    const matchStack = !activeFilters.stack || activeFilters.stack.includes(t.Stack);
                    const matchTool = !activeFilters.tool || activeFilters.tool.includes(t.개발Tool);
                    return matchDept && matchManager && matchStage && matchStack && matchTool;
                });

                if (filteredData.length === 0) {
                    showToast('내보낼 데이터가 없습니다.', 'warning');
                    return;
                }

                // Date formatting helper: Serial -> YYYY.M.D
                const excelDateToJS = (serial) => {
                    if (!serial || isNaN(serial) || serial < 1000) return serial;
                    const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
                    return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
                };

                const exportRows = filteredData.map(t => {
                    const expectedDate = t.완료예정일정 || t.완료예정일자 || '';
                    const isPlaceholder = (val) => val == 46192 || val == "46192";

                    return {
                        '부서명': t.부서명 || '',
                        '담당자': t.담당자 || '',
                        '과제명': t.과제명 || '',
                        '완료예정일정': excelDateToJS(expectedDate),
                        '구현방안확정': isPlaceholder(t.구현방안확정) ? '' : (t.구현방안확정 || ''),
                        '테스트중': isPlaceholder(t.테스트중) ? '' : (t.테스트중 || ''),
                        '검증': isPlaceholder(t.검증) ? '' : (t.검증 || ''),
                        '현업파일럿': isPlaceholder(t.현업파일럿) ? '' : (t.현업파일럿 || ''),
                        '완료': isPlaceholder(t.완료) ? '' : (t.완료 || ''),
                        '단계': t.단계 || '',
                        '진척도': t.진척도 || '',
                        '진척도_이전': t.진척도_이전 || '',
                        '개발Tool': t.개발Tool || '',
                        'Stack': t.Stack || '',
                        '비고': t.비고 || '',
                        'wid': t.wid || selectedWid
                    };
                });

                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(exportRows);
                
                // Set column widths for better readability
                const wscols = [
                    {wch: 15}, {wch: 10}, {wch: 40}, {wch: 15}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}, {wch: 12}, 
                    {wch: 15}, {wch: 10}, {wch: 10}, {wch: 15}, {wch: 15}, {wch: 50}, {wch: 8}
                ];
                ws['!cols'] = wscols;

                XLSX.utils.book_append_sheet(wb, ws, "과제상세현황");
                XLSX.writeFile(wb, `AX_Report_Raw_${selectedWid || 'All'}.xlsx`);
                
                showToast('Excel 다운로드가 완료되었습니다.', 'success');
            } catch (e) {
                console.error("Excel Export Error:", e);
                showToast('Excel 내보내기 중 오류가 발생했습니다.', 'error');
            }
        }

async function exportToHTML() {
            try {
                showToast('단독 실행용 HTML 생성 중...', 'info');
                
                // Get current HTML
                const currentHtml = document.documentElement.outerHTML;
                
                // Parse it to replace embedded data
                const parser = new DOMParser();
                const doc = parser.parseFromString(currentHtml, 'text/html');
                
                // Fetch the latest data from localStorage
                const allWeeklyData = JSON.parse(localStorage.getItem('ax_weekly_tasks') || '{}');
                
                // Inject into embedded-data tag
                const scriptTag = doc.getElementById('embedded-data');
                if (scriptTag) {
                    scriptTag.textContent = JSON.stringify(allWeeklyData);
                } else {
                    console.error("embedded-data tag not found!");
                }
                
                // Create Blob and trigger download
                const blob = new Blob(['<!DOCTYPE html>\\n' + doc.documentElement.outerHTML], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `ax_report_shared_${new Date().toISOString().slice(0,10)}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showToast('공유용 HTML 다운로드가 완료되었습니다.', 'success');
            } catch (error) {
                console.error('Export HTML Error:', error);
                showToast('HTML 내보내기 중 오류가 발생했습니다.', 'error');
            }
        }

async function handlePDFExport() {
            try {
                showToast('PDF 리포트 생성 중...', 'info');
                const element = document.getElementById('page-container');
                const originalContent = element.innerHTML;
                
                // --- Prepare element for PDF ---
                // 1. Hide unwanted elements
                const excludes = element.querySelectorAll('[data-pdf-exclude]');
                excludes.forEach(el => el.style.display = 'none');
                
                // 2. Temporarily show BOTH Top 5 and Worst 5
                // We'll search for the Top 5 section and modify it
                const top5Section = element.querySelector('.glass.p-8.rounded-\\[2\\.5rem\\]'); // Find the Top 5 section
                if (top5Section) {
                    const top5Title = top5Section.querySelector('h5');
                    if (top5Title) top5Title.innerText = "진척률 성과 요약 (우수 5 / 저조 5)";
                    
                    // Hide the toggle buttons
                    const toggleBtnContainer = top5Section.querySelector('.flex.bg-slate-900\\/50');
                    if (toggleBtnContainer) toggleBtnContainer.style.display = 'none';
                    
                    // We need to re-render the cards to show BOTH. 
                    // This is tricky because it's already rendered. 
                    // Let's manually inject the missing 5.
                    const cardsContainer = top5Section.querySelector('.flex.overflow-x-auto');
                    if (cardsContainer) {
                        // Current cards are already there. 
                        // If current mode is 'best', we add 'worst'. If 'worst', we add 'best'.
                        const otherMode = currentTop5Mode === 'best' ? 'worst' : 'best';
                        const cleanDataForPDF = taskData.map(t => {
                            const cur = parseFloat(t.진척도) || 0;
                            const prev = parseFloat(t.진척도_이전) || 0;
                            return { ...t, cur, prev, diff: cur - prev, displayManager: t.담당자 || '담당자' };
                        });
                        
                        const otherData = [...cleanDataForPDF]
                            .sort((a, b) => {
                                if (otherMode === 'best') return (b.cur - b.prev) - (a.cur - a.prev);
                                else return a.cur - b.cur;
                            })
                            .slice(0, 5)
                            .map((t, idx) => {
                                const diff = t.cur - t.prev;
                                const isBest = otherMode === 'best';
                                const cardBg = isBest ? '#DFF0F3' : '#F4D2DD';
                                const curColor = isBest ? 'text-emerald-600' : 'text-slate-700';
                                const diffColor = isBest ? 'text-blue-600' : 'text-rose-600';
                                return `
                                    <div class="p-6 rounded-2xl border border-white/20 relative overflow-hidden flex-shrink-0 w-80 shadow-lg" style="background-color: ${cardBg}; margin-right: 1rem;">
                                        <div class="text-[10px] font-bold text-slate-500 mb-2 uppercase">RANK ${idx + 1} (${otherMode === 'best' ? '우수' : '저조'})</div>
                                        <div class="text-sm font-bold text-slate-800 truncate mb-4">${t.과제명 || 'Untitled'}</div>
                                        <div class="grid grid-cols-2 gap-2">
                                            <div><div class="text-xl font-black ${curColor}">${t.cur}%</div><div class="text-[9px] text-slate-500 font-bold">진도율</div></div>
                                            <div class="text-right"><div class="text-xl font-black ${diffColor}">${diff > 0 ? '↑ +' + diff + '%' : diff < 0 ? '↓ ' + diff + '%' : '-'}</div><div class="text-[9px] text-slate-500 font-bold">전주비</div></div>
                                        </div>
                                    </div>
                                `;
                            }).join('');
                        
                        cardsContainer.innerHTML += otherData;
                    }
                }

                const opt = {
                    margin: 5,
                    filename: `AX_Report_${selectedWid || 'Dashboard'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                await html2pdf().from(element).set(opt).save();
                
                // Restore original state
                element.innerHTML = originalContent;
                lucide.createIcons();
                initReportCharts();
                showToast('PDF 다운로드가 완료되었습니다.', 'success');
            } catch (e) {
                console.error("PDF Export Error:", e);
                showToast('PDF 내보내기 중 오류가 발생했습니다.', 'error');
            }
        }

async function handleExcelUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                console.log("📂 [Excel Upload] Workbook Sheets:", workbook.SheetNames);
                let jsonData = [];
                let sheetName = "";
                // 데이터가 있는 첫 번째 시트 찾기
                for (const name of workbook.SheetNames) {
                    const sheet = workbook.Sheets[name];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    
                    if (rows.length > 0) {
                        // 헤더 행 찾기 (부서, 과제, 진척 등 키워드가 포함된 가장 빠른 행)
                        let headerIdx = 0;
                        for (let i = 0; i < Math.min(rows.length, 10); i++) {
                            const rowStr = JSON.stringify(rows[i]);
                            if (rowStr.includes("부서") || rowStr.includes("과제") || rowStr.includes("진척") || rowStr.includes("Task")) {
                                headerIdx = i;
                                break;
                            }
                        }
                        
                        // 해당 행을 헤더로 하여 다시 파싱
                        jsonData = XLSX.utils.sheet_to_json(sheet, { range: headerIdx });
                        sheetName = name;
                        
                        console.log(`📌 [Excel Header Detected] Sheet: ${name}, Row: ${headerIdx + 1}`);
                        if (jsonData.length > 0) {
                            console.log("📌 [First Row Keys]:", Object.keys(jsonData[0]));
                            break;
                        }
                    }
                }

                if (jsonData.length > 0) {
                    // 키값 정규화 (공백 제거 등)
                    const normalizedData = jsonData.map(row => {
                        const newRow = {};
                        for (let key in row) {
                            const normalizedKey = key.trim().replace(/\s+/g, '');
                            newRow[normalizedKey] = row[key];
                        }
                        return newRow;
                    });

                    console.log("📊 [Excel Upload] Normalized Data Sample:", normalizedData[0]);

                    const firstRow = normalizedData[0];
                    // W-ID, WID 등 다양한 형태 지원
                    const wid = firstRow['W-ID'] || firstRow['WID'] || firstRow['wid'] || '';
                    
                    if (wid) {
                        reportTitle = `${wid} (${sheetName}) 과제 진척 리포트`;
                    } else {
                        reportTitle = `${sheetName} 과제 진척 리포트`;
                    }

                    // Map Excel columns to taskData structure
                    let extractedWid = '';
                    let lastDept = '';
                    let lastManager = '';
                    let lastRowWid = '';
                    let lastTaskName = '';

                    const mappedData = normalizedData.map((row, idx) => {
                        const allKeys = Object.keys(row);
                        const getVal = (keywords) => {
                            // 1. Exact/Normalized match
                            for (const k of keywords) {
                                if (row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
                            }
                            // 2. Fuzzy match
                            for (const key of allKeys) {
                                const cleanKey = key.trim().replace(/[^\w가-힣]/g, '');
                                for (const kw of keywords) {
                                    const cleanKw = kw.trim().replace(/[^\w가-힣]/g, '');
                                    if (cleanKey.includes(cleanKw)) {
                                        if (row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
                                    }
                                }
                            }
                            return '';
                        };

                        const currentDept = getVal(['부서명', '부서', '팀명', '팀', '소속']);
                        if (currentDept) lastDept = currentDept;
                        
                        const currentManager = getVal(['담당자', '담당', '담당자명', 'Owner', '성명']);
                        if (currentManager) lastManager = currentManager;

                        const rowWid = String(getVal(['W-ID', 'WID', '주차', 'wid'])).trim();
                        if (rowWid) lastRowWid = rowWid;
                        
                        const currentTaskName = String(getVal(['과제명', '과제', '제목', 'Task', '프로젝트', 'TaskName'])).trim();
                        if (currentTaskName) lastTaskName = currentTaskName;
                        
                        if (idx === 0 || !extractedWid) {
                            extractedWid = lastRowWid;
                        }

                        const rawProgress = getVal(['진척률', '진척도', '진척', '전체진척율', 'Progress', '완료율', '이행율', '진척율']);
                        let cleanProgress = '0';
                        if (typeof rawProgress === 'number') {
                            cleanProgress = (rawProgress <= 1 ? Math.round(rawProgress * 100) : rawProgress).toString();
                        } else {
                            cleanProgress = String(rawProgress).replace(/%/g, '').trim() || '0';
                        }

                        const rawPrevProgress = getVal(['이전진척도', 'W17진척도', '이전주차진척도', '지난주진척', '진척도_이전', '전주진척', '전주진척도', '전주진척율']);
                        let cleanPrevProgress = cleanProgress;
                        if (rawPrevProgress !== '' && rawPrevProgress !== undefined) {
                            if (typeof rawPrevProgress === 'number') {
                                cleanPrevProgress = (rawPrevProgress <= 1 ? Math.round(rawPrevProgress * 100) : rawPrevProgress).toString();
                            } else {
                                cleanPrevProgress = String(rawPrevProgress).replace(/%/g, '').trim() || '0';
                            }
                        }

                        const rawBigo = String(getVal(['비고', '참고', 'Note', '특이사항'])).trim();
                        let devTool = getVal(['개발 Tool', '개발Tool', 'Tool', '개발도구', '도구', 'Tool명']);
                        let stack = getVal(['Stack', '스택', '기술스택', '사용기술']);

                        // 비고 내부에 2. 개발Tool, 3. Stack 형식이 있을 경우 파싱 (하위 호환성)
                        if ((!devTool || devTool === '-') && rawBigo.includes('2.')) {
                            const parts = rawBigo.split(/[1-9]\./);
                            if (parts[2]) devTool = parts[2].trim();
                        }
                        if ((!stack || stack === '-') && rawBigo.includes('3.')) {
                            const parts = rawBigo.split(/[1-9]\./);
                            if (parts[3]) stack = parts[3].trim();
                        }

                        const isChecked = (val) => {
                            if (!val) return false;
                            const s = String(val).toUpperCase().trim();
                            // 'O', 'V', '0', '1', 'TRUE' 등을 체크마크로 인식
                            return s === 'O' || s === 'V' || s === '0' || s === '1' || s === 'TRUE';
                        };

                        // 단계 파싱 (O 표시 확인)
                        let detectedStage = getVal(['단계', '현단계', '상태', 'Status']);
                        if (!detectedStage) {
                            // 각 단계별 키워드 강화 (파일롯/파일럿, 개발/테스트 등)
                            const v5 = getVal(['완료', 'Stage5']);
                            const v4 = getVal(['현업 파일럿', '현업 파일롯', '현업파일럿', '현업파일롯', 'Pilot', 'Stage4']);
                            const v3 = getVal(['기능 검증', '기능검증', '검증', 'Stage3']);
                            const v2 = getVal(['개발/테스트', '개발테스트', '테스트', 'Stage2']);
                            const v1 = getVal(['구현방안확정', '구현방안', 'Stage1']);

                            if (isChecked(v5)) detectedStage = '완료';
                            else if (isChecked(v4)) detectedStage = '현업파일럿';
                            else if (isChecked(v3)) detectedStage = '검증';
                            else if (isChecked(v2)) detectedStage = '개발/테스트';
                            else if (isChecked(v1)) detectedStage = '구현방안확정';
                        }

                        return {
                            isEmptyRow: !currentTaskName && rawProgress === undefined && !detectedStage && !rawBigo,
                            부서명: lastDept,
                            담당자: lastManager,
                            과제명: lastTaskName,
                            완료예정일정: getVal(['완료예정일정', '마감일', 'DueDate', '완료일']),
                            구현방안확정: getVal(['구현방안확정', 'Stage1', '1단계']),
                            테스트중: getVal(['개발/테스트', 'Stage2', '2단계']),
                            검증: getVal(['기능 검증', '기능검증', '검증', 'Stage3', '3단계']),
                            현업파일럿: getVal(['현업 파일럿', '현업파일럿', 'Pilot', 'Stage4', '4단계']),
                            완료: getVal(['완료', 'Stage5', '5단계']),
                            단계: detectedStage,
                            진척도: cleanProgress + '%',
                            진척도_이전: cleanPrevProgress + '%',
                            개발Tool: devTool || '-',
                            Stack: stack || '-',
                            비고: rawBigo,
                            wid: lastRowWid || extractedWid || wid
                        };
                    });

                    // 유효한 과제 필터링
                    taskData = mappedData.filter(t => t.과제명 && String(t.과제명).trim() !== '' && !t.isEmptyRow);
                    const finalWid = extractedWid || wid || '';
                    
                    if (finalWid) {
                        selectedWid = finalWid;
                        reportTitle = `${finalWid} (${sheetName}) 과제 진척 리포트`;
                    } else {
                        reportTitle = `${sheetName} 과제 진척 리포트`;
                    }

                    console.log("✅ [Final TaskData Sample]:", taskData.slice(0, 3));
                    await FirebaseManager.saveTaskData(finalWid || 'Default', taskData);
                    
                    showToast(`${taskData.length}개의 과제 데이터를 분석 중입니다...`, 'info');
                    
                    // 신규 주차 업로드시 최근 두개 주차 자동 선택
                    await updateAvailableWids(true);
                    saveTaskData();
                    initDataSync();
                    
                    showToast('엑셀 데이터가 성공적으로 업로드되었습니다.', 'success');
                    await switchWid(finalWid);
                }
            };
            reader.readAsArrayBuffer(file);
        }

function renderTasks() {
            const container = document.getElementById('page-container');
            container.innerHTML = '';
            
            // Clean and prepare data once
            const cleanData = taskData.map((t, idx) => {
                const cur = parseFloat(t.진척도) || 0;
                const prev = parseFloat(t.진척도_이전) || 0;
                console.log('Task 진척도:', t.진척도, 'isDrop:', String(t.진척도).trim().toLowerCase() === 'drop');
                const isDrop = String(t.진척도).replace(/%/g, '').trim().toLowerCase() === 'drop' || String(t.단계).trim().toLowerCase() === 'drop' || String(t.비고).trim().toLowerCase() === 'drop';
                const isNew = String(t.비고).replace(/\s/g, '').toLowerCase().includes('신규') || String(t.단계).replace(/\s/g, '').toLowerCase().includes('신규');
                const stage = isDrop ? 'Drop' : (t.단계 || (cur === 100 ? '완료' : cur >= 80 ? '현업파일럿' : cur >= 60 ? '검증' : cur >= 40 ? '개발/테스트' : cur >= 20 ? '구현방안확정' : cur === 0 ? '과제기획' : '과제기획'));
                let displayManager = t.담당자 || '담당자';
                return { ...t, cur, prev, diff: cur - prev, stage, displayManager };
            });

            const totalTasks = cleanData.length;

                else if (stage === '검증') stageClass = 'bg-blue-100 text-blue-700 font-bold';
                else if (stage === '개발/테스트' || stage === '테스트') stageClass = 'bg-indigo-100 text-indigo-700 font-bold';
                else if (stage === '구현방안확정') stageClass = 'bg-orange-100 text-orange-700 font-bold';
                else if (stage === '과제기획') stageClass = 'bg-slate-100 text-slate-600 font-bold';

                return `
                    <tr class="hover:bg-slate-800/30 transition-colors group task-row border-b border-slate-800/50 whitespace-nowrap" 
                        data-dept="${t.부서명 || ''}" 
                        data-manager="${displayManager || ''}"
                        data-stage="${stage || ''}"
                        data-stack="${t.Stack || ''}"
                        data-tool="${t.개발Tool || ''}"
                        data-wid="${t.wid || ''}">
                        <td class="px-6 py-5 text-sm font-medium text-textPrimary whitespace-nowrap overflow-hidden">${t.wid || '-'}</td>
                        <td class="px-6 py-5 text-sm font-medium text-textPrimary whitespace-nowrap overflow-hidden">${idx + 1}</td>
                        <td class="px-6 py-5 whitespace-nowrap overflow-hidden"><span class="px-3 py-1 bg-slate-800 rounded-lg font-bold text-[12px] whitespace-nowrap inline-block text-slate-300">${t.부서명 || 'N/A'}</span></td>

                        <td class="px-6 py-5 whitespace-nowrap overflow-hidden">
                            <span class="px-3 py-1 rounded-lg text-[12px] font-bold ${stageClass} whitespace-nowrap inline-block">${stage}</span>
                        </td>
                        <td class="px-6 py-5 whitespace-nowrap">
                            <div class="flex items-center gap-3 whitespace-nowrap flex-nowrap">
                                <div class="flex-1 h-2.5 bg-slate-200 rounded-full overflow-hidden min-w-[80px] flex-shrink-0">
                                    <div class="h-full bg-slate-500" style="width: ${prev}%"></div>
                                </div>
                                <span class="text-[12px] text-slate-500 w-10 text-right font-bold whitespace-nowrap">${prev}%</span>
                            </div>
                        </td>
                        <td class="px-6 py-5 whitespace-nowrap">
                            <div class="flex items-center gap-3 whitespace-nowrap flex-nowrap">
                                <div class="flex-1 h-2.5 bg-slate-200 rounded-full overflow-hidden min-w-[80px] flex-shrink-0">
                                    <div class="h-full bg-blue-600" style="width: ${cur}%"></div>
                                </div>
                                <span class="font-bold w-10 text-right text-[12px] text-textPrimary whitespace-nowrap">${cur}%</span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-center whitespace-nowrap">
                            <span class="font-bold text-[13px] ${diff > 0 ? 'text-green-600' : diff < 0 ? 'text-red-500' : 'text-slate-400'} whitespace-nowrap">
                                ${diff > 0 ? '↑ +' + diff + '%' : diff < 0 ? '↓ ' + diff + '%' : '-'}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-sm text-textPrimary font-medium whitespace-nowrap overflow-hidden">${t.개발Tool || '-'}</td>
                        <td class="px-6 py-5 text-sm text-textPrimary font-medium whitespace-nowrap overflow-hidden">${t.Stack || '-'}</td>
                        <td class="px-6 py-5 whitespace-nowrap overflow-hidden">
                            <div class="text-[11px] text-slate-500 truncate max-w-[400px] italic whitespace-nowrap">${t.비고 || '-'}</div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

function renderFilterDropdown(id, label, options) {
            return `
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-slate-500 ml-1">${label}</label>
                    <div class="filter-dropdown" id="dropdown-${id}">
                        <button onclick="toggleFilterDropdown('${id}')" class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-bold text-slate-700 focus:outline-none focus:border-blue-500 cursor-pointer flex items-center gap-3 min-w-[140px] justify-between shadow-sm hover:border-slate-300 transition-all">
                            <span id="label-${id}">전체</span>
                            <i data-lucide="chevron-down" class="w-3.5 h-3.5 text-slate-400"></i>
                        </button>
                        <div class="filter-dropdown-content custom-scrollbar" id="content-${id}">
                            <div class="filter-item active" onclick="toggleFilterItem(event, '${id}', 'all')">
                                <input type="checkbox" class="filter-checkbox" checked>
                                <span>전체</span>
                            </div>
                            ${options.map(opt => `
                                <div class="filter-item" onclick="toggleFilterItem(event, '${id}', '${opt.replace(/'/g, "\\'")}')">
                                    <input type="checkbox" class="filter-checkbox">
                                    <span>${opt}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

function toggleFilterDropdown(id) {
            const content = document.getElementById(`content-${id}`);
            
            // Close other dropdowns
            document.querySelectorAll('.filter-dropdown-content').forEach(el => {
                if (el.id !== `content-${id}`) el.classList.remove('show');
            });

            content.classList.toggle('show');
        }



function resetFilters() {
            ['dept', 'manager', 'stage', 'stack', 'tool'].forEach(id => {
                const content = document.getElementById(`content-${id}`);
                if (!content) return;
                const allItem = content.querySelector('.filter-item:first-child');
                const allCheck = allItem.querySelector('.filter-checkbox');
                const otherItems = content.querySelectorAll('.filter-item:not(:first-child)');
                
                allCheck.checked = true;
                allItem.classList.add('active');
                otherItems.forEach(item => {
                    item.querySelector('.filter-checkbox').checked = false;
                    item.classList.remove('active');
                });
                updateFilterLabel(id);
            });
            filterTaskTable();
        }

function initReportCharts() {
            const sortedWids = [...availableWids].sort((a, b) => b.localeCompare(a, undefined, {numeric: true}));
            const currentIndex = sortedWids.indexOf(selectedWid);
            const prevLabel = compareWid || "이전 주차";
            const currentLabel = selectedWid || "현재 주차";

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', font: { size: 16, weight: '600' }, usePointStyle: true, padding: 15 }
                    },
                    datalabels: {
                        display: true,
                        color: '#64748b',
                        font: { size: 14, weight: 'bold' },
                        formatter: (val) => val > 0 ? val : ''
                    }
                },
                scales: {
                    y: { display: false },
                    x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 15 } } }
                }
            };

            // 1. Progress Comparison Chart (Dynamic)
            const stagesForComp = ['과제기획', '구현방안확정', '개발/테스트', '검증', '현업파일럿', '완료'];
            // Use same cleaning logic for consistency
            const chartCleanData = taskData.map(t => {
                const cur = parseInt(t.진척도) || 0;
                const prev = parseInt(t.진척도_이전) || 0;
                console.log('Task 진척도:', t.진척도, 'isDrop:', String(t.진척도).trim().toLowerCase() === 'drop');
                const isDrop = String(t.진척도).replace(/%/g, '').trim().toLowerCase() === 'drop' || String(t.단계).trim().toLowerCase() === 'drop' || String(t.비고).trim().toLowerCase() === 'drop';
                const isNew = String(t.비고).replace(/\s/g, '').toLowerCase().includes('신규') || String(t.단계).replace(/\s/g, '').toLowerCase().includes('신규');
                const isPrevDrop = String(t.진척도_이전).replace(/%/g, '').trim().toLowerCase() === 'drop'; // Only check previous progress
                const mapStage = (v) => (v === 100 ? '완료' : v >= 80 ? '현업파일럿' : v >= 60 ? '검증' : v >= 40 ? '개발/테스트' : v >= 20 ? '구현방안확정' : v === 0 ? '과제기획' : '과제기획');
                const curStage = isDrop ? 'Drop' : (t.단계 === '테스트' ? '개발/테스트' : (t.단계 || mapStage(cur)));
                const prevStage = isPrevDrop ? 'Drop' : mapStage(prev);
                return { curStage, prevStage, isDrop, isNew };
            });

            const compDataCurrent = stagesForComp.map(s => chartCleanData.filter(t => t.curStage === s).length);
            const compDataPrev = stagesForComp.map(s => chartCleanData.filter(t => t.prevStage === s).length);
            
            const dropCount = chartCleanData.filter(t => t.isDrop).length;
            const dropBox = document.getElementById('drop-count-box');
            if (dropBox) {
                if (dropCount > 0) {
                    dropBox.innerText = `Drop 과제 ${dropCount}개`;
                    dropBox.classList.remove('hidden');
                } else {
                    dropBox.classList.add('hidden');
                }
            }

            const newCount = chartCleanData.filter(t => t.isNew).length;
            const newBox = document.getElementById('new-task-count-box');
            if (newBox) {
                if (newCount > 0) {
                    newBox.innerText = `신규 과제 ${newCount}개`;
                    newBox.classList.remove('hidden');
                } else {
                    newBox.classList.add('hidden');
                }
            }

            const comparisonCanvas = document.getElementById('progressComparisonChart');
            if (comparisonCanvas) {
                const comparisonCtx = comparisonCanvas.getContext('2d');
                new Chart(comparisonCtx, {
                    type: 'bar',
                    data: {
                        labels: stagesForComp,
                        datasets: [
                            { 
                                label: prevLabel, 
                                data: compDataPrev, 
                                backgroundColor: 'rgba(148, 163, 184, 0.3)', 
                                borderRadius: 8,
                                datalabels: { align: 'center', anchor: 'center', color: '#475569' }
                            },
                            { 
                                label: currentLabel, 
                                data: compDataCurrent, 
                                backgroundColor: '#4285F4', 
                                borderRadius: 8,
                                datalabels: { align: 'center', anchor: 'center', color: '#FFFFFF' }
                            }
                        ]
                    },
                    options: chartOptions
                });
            }

            // 2. Dept Stage Distribution
            const deptStageData = {};
            // Use same cleaning logic for charts
            const processedData = taskData.map(t => {
                const cur = parseInt(t.진척도) || 0;
                console.log('Task 진척도:', t.진척도, 'isDrop:', String(t.진척도).trim().toLowerCase() === 'drop');
                const isDrop = String(t.진척도).replace(/%/g, '').trim().toLowerCase() === 'drop' || String(t.단계).trim().toLowerCase() === 'drop' || String(t.비고).trim().toLowerCase() === 'drop';
                const isNew = String(t.비고).replace(/\s/g, '').toLowerCase().includes('신규') || String(t.단계).replace(/\s/g, '').toLowerCase().includes('신규');
                const stage = isDrop ? 'Drop' : (t.단계 || (cur === 100 ? '완료' : cur >= 80 ? '현업파일럿' : cur >= 60 ? '검증' : cur >= 40 ? '개발/테스트' : cur >= 20 ? '구현방안확정' : cur === 0 ? '과제기획' : '과제기획'));
                return { ...t, cur, stage };
            });

            processedData.forEach(item => {
                const dept = item.부서명 || 'N/A';
                const stage = item.stage === '테스트' ? '개발/테스트' : (item.stage || '계획');
                
                if (!deptStageData[dept]) deptStageData[dept] = { '과제기획': 0, '구현방안확정': 0, '개발/테스트': 0, '검증': 0, '현업파일럿': 0, '완료': 0, 'Drop': 0 };
                                                if (deptStageData[dept][stage] !== undefined) {
                    deptStageData[dept][stage]++;
                } else {
                    deptStageData[dept]['과제기획']++;
                }
            });
            const deptLabels = Object.keys(deptStageData).sort();

            const deptStageCanvas = document.getElementById('deptStageChart');
            if (deptStageCanvas) {
                const deptStageCtx = deptStageCanvas.getContext('2d');
                new Chart(deptStageCtx, {
                    type: 'bar',
                    data: {
                        labels: deptLabels,
                        datasets: [
                            
                            { label: 'Drop', data: deptLabels.map(d => deptStageData[d]['Drop']), backgroundColor: '#808080', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } },
                            { label: '과제기획', data: deptLabels.map(d => deptStageData[d]['과제기획']), backgroundColor: '#F4F4F4', borderRadius: 4, stack: 'stack0', datalabels: { color: '#475569', font: { size: 14, weight: 'bold' } } },
                            { label: '구현방안확정', data: deptLabels.map(d => deptStageData[d]['구현방안확정']), backgroundColor: '#ed8936', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } },
                            { label: '개발/테스트', data: deptLabels.map(d => deptStageData[d]['개발/테스트']), backgroundColor: '#60a5fa', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } },
                            { label: '검증', data: deptLabels.map(d => deptStageData[d]['검증']), backgroundColor: '#3b82f6', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } },
                            { label: '현업파일럿', data: deptLabels.map(d => deptStageData[d]['현업파일럿']), backgroundColor: '#a78bfa', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } },
                            { label: '완료', data: deptLabels.map(d => deptStageData[d]['완료']), backgroundColor: '#48bb78', borderRadius: 4, stack: 'stack0', datalabels: { color: '#fff', font: { size: 14 } } }
                        ]
                    },
                    options: { 
                        ...chartOptions, 
                        plugins: {
                            ...chartOptions.plugins,
                            datalabels: {
                                ...chartOptions.plugins.datalabels,
                                align: 'center',
                                anchor: 'center',
                                formatter: (val) => val > 0 ? val : ''
                            }
                        },
                        scales: { 
                            y: { display: false, stacked: true }, 
                            x: { ...chartOptions.scales.x, stacked: true } 
                        } 
                    }
                });
            }

            // 3. Dept Comprehensive Chart
            const deptStats = {};
            processedData.forEach(item => {
                const dept = item.부서명 || 'N/A';
                const cur = item.cur;
                const prev = parseInt(item.진척도_이전) || 0;
                if (!deptStats[dept]) deptStats[dept] = { count: 0, sum45: 0, sum44: 0 };
                deptStats[dept].count++;
                deptStats[dept].sum45 += cur;
                deptStats[dept].sum44 += prev;
            });
            const dLabels = Object.keys(deptStats);

            const deptCtx = document.getElementById('deptChart').getContext('2d');
            new Chart(deptCtx, {
                data: {
                    labels: dLabels,
                    datasets: [
                        { type: 'bar', label: '과제 수', data: dLabels.map(d => deptStats[d].count), backgroundColor: 'rgba(124, 58, 237, 0.2)', borderRadius: 6, yAxisID: 'y' },
                        { type: 'line', label: `${currentLabel} 진척도 (%)`, data: dLabels.map(d => Math.round(deptStats[d].sum45 / deptStats[d].count)), borderColor: '#7c3aed', borderWidth: 3, tension: 0.4, yAxisID: 'y1', pointRadius: 4, pointBackgroundColor: '#7c3aed' },
                        { type: 'line', label: `${prevLabel} 진척도 (%)`, data: dLabels.map(d => Math.round(deptStats[d].sum44 / deptStats[d].count)), borderColor: '#94a3b8', borderWidth: 2, borderDash: [5, 5], tension: 0.4, yAxisID: 'y1', pointRadius: 0 }
                    ]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        y: { type: 'linear', position: 'left', max: 5, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#64748b' } },
                        y1: { type: 'linear', position: 'right', max: 100, grid: { display: false }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }






    </script>
